<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personalized Web Page</title>
  
  <link rel="stylesheet" href="style.css">

  <script defer src="script.js"></script>
</head>
<body>

  <div class="wrapper">

    
    <section id="form-section" class="card">
      <h1>Welcome </h1>
      <p class="subtitle">Enter your details below</p>

      <form id="userForm">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Enter your name" required>

        <label for="age">Age</label>
        <input type="number" id="age" placeholder="Enter your age" required>

        <button type="submit">Continue</button>
      </form>
    </section>

    
    <section id="output" class="card hidden">

      <h2 id="greeting"></h2>

      <div class="info-box" id="months"></div>

      <div class="info-box" id="access"></div>

      <div class="quotes-box" id="quotes"></div>

      <button id="resetBtn" class="reset-btn">Start Over</button>

    </section>

  </div>

</body>
</html>
